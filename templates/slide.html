<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Carousel Slide</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="slide-container" id="slide-bg">
        <div class="glass-card">
            <!-- Header Tag (e.g., 'AI NEWS' or 'NEW TOOL') -->
            <div class="tag-badge" id="slide-tag">AI NEWS</div>
            
            <!-- Main Title -->
            <h1 id="slide-title">OpenAI Releases GPT-4o with Native Audio & Vision</h1>
            
            <!-- Content Area (Bullet points or description) -->
            <div class="content-box">
                <p id="slide-content">The new model is faster, cheaper, and natively processes audio and video in real-time without intermediate conversions. It brings human-like voice interactions to ChatGPT.</p>
            </div>
            
            <!-- Footer -->
            <div class="footer">
                <div class="profile-info">
                    <div class="avatar">
                        <div class="avatar-inner"></div>
                    </div>
                    <span class="handle">@ya5h.ai</span>
                </div>
                <div class="swipe-indicator" id="swipe-text">Swipe &#8594;</div>
            </div>
        </div>
    </div>
</body>
</html>
