name: Daily Instagram AI Carousel

on:
  schedule:
    # Runs at 10:30 AM UTC daily (which is exactly 4:00 PM IST)
    - cron: '30 10 * * *'
  workflow_dispatch: # Allows you to manually trigger it anytime from GitHub

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install NPM dependencies
      run: npm install

    - name: Install Headless Browser (Puppeteer) Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2

    - name: Run Carousel Bot
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        IG_USER_ID: ${{ secrets.IG_USER_ID }}
        IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
      run: node src/index.js

    - name: Save History to prevent repeats
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data/history.json
        # If there are changes to history.json, commit and push them
        git commit -m "Auto-update: appended new AI topics to history" || echo "No new topics today"
        git push
